<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Dash | Mission Control</title>
    <style>
        /* This CSS is now INSIDE the HTML file so it can't fail */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content-box {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 50px;
            border-radius: 20px;
            border: 2px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            max-width: 450px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: #00f2ff;
            text-shadow: 0 0 20px #00f2ff;
            letter-spacing: 5px;
        }

        .tagline {
            color: #ff0055;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .instructions {
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .play-button {
            display: inline-block;
            margin-top: 20px;
            padding: 20px 50px;
            background: #ff0055;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            border-radius: 50px;
            box-shadow: 0 0 20px #ff0055;
            transition: 0.3s;
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff0055;
            background: #ff3377;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <h1>VELOCITY DASH</h1>
        <div class="tagline">GALAXY EDITION</div>

        <div class="instructions">
            <strong>SYSTEM REQUIREMENTS:</strong><br>
            🚀 Goal: Dash as far as possible.<br>
            ⌨️ Control: Press <b>SPACE</b> to Jump.<br>
            ⚠️ Alert: Speed increases every 10 points!
        </div>

        <a href="game.html" class="play-button">LAUNCH MISSION</a>
    </div>

</body>
</html>
