<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Dash | Galaxy Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ANIMATED STAR BACKGROUND */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #050508 100%);
            z-index: -1;
        }

        /* This creates the star effect using shadows */
        .stars {
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 400px 200px #FFF, 100px 500px #FFF, 800px 300px #FFF, 200px 100px #FFF, 600px 700px #FFF, 350px 450px #FFF, 900px 50px #FFF, 50px 800px #FFF, 500px 500px #FFF, 750px 250px #FFF;
            animation: spaceScroll 50s linear infinite;
        }

        @keyframes spaceScroll {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        /* MAIN UI BOX */
        .content-box {
            text-align: center;
            background: rgba(10, 10, 20, 0.85);
            padding: 50px;
            border-radius: 30px;
            border: 2px solid #00f2ff;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            max-width: 450px;
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #00f2ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        .tagline {
            color: #ff0055;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        .instructions {
            text-align: left;
            background: rgba(255, 255, 255, 0.07);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 35px;
            border-left: 4px solid #00f2ff;
        }

        .play-button {
            display: inline-block;
            padding: 20px 60px;
            background: #ff0055;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            border-radius: 60px;
            box-shadow: 0 0 25px #ff0055;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-button:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 50px #ff0055;
            background: #ff3377;
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="stars"></div>
        <div class="stars" style="box-shadow: 150px 150px #FFF, 450px 600px #FFF, 850px 100px #FFF, 300px 800px #FFF; animation-duration: 100s;"></div>
    </div>

    <div class="content-box">
        <h1>VELOCITY DASH</h1>
        <div class="tagline">LOST IN ORBIT</div>

        <div class="instructions">
            <strong>MISSION PROTOCOL:</strong><br><br>
            🚀 <b>THRUSTERS:</b> Press [SPACE] to jump.<br>
            ☄️ <b>DANGER:</b> Avoid the red energy pulses.<br>
            📈 <b>ACCELERATION:</b> The dash gets faster every 10 points!
        </div>

        <a href="game.html" class="play-button">LAUNCH MISSION</a>
    </div>

</body>
</html>
