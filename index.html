<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Dash | Mission Control</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020205; color: white; font-family: sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* 🌌 NEW STAR FIX: Using a radial gradient to simulate stars */
        .galaxy-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020205;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            z-index: -1;
        }

        .content-box {
            text-align: center; background: rgba(0, 0, 0, 0.8);
            padding: 40px; border-radius: 20px; border: 1px solid #00f2ff;
            backdrop-filter: blur(10px); z-index: 10;
        }

        h1 { font-size: 3rem; color: #00f2ff; text-shadow: 0 0 20px #00f2ff; }

        .play-button {
            display: inline-block; margin-top: 20px; padding: 15px 40px;
            background: #ff0055; color: white; text-decoration: none;
            font-weight: bold; border-radius: 50px; box-shadow: 0 0 20px #ff0055;
        }
    </style>
</head>
<body>
    <div class="galaxy-bg"></div> <div class="content-box">
        <h1>VELOCITY DASH</h1>
        <p>Use Mouse to Move | Click to Shoot</p>
        <a href="game.html" class="play-button">LAUNCH MISSION</a>
    </div>
</body>
</html>
